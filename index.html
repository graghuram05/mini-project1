<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">Flipkart</div>
    <input type="text" placeholder="Search for products, brands and more">
    <button class="login-btn">Login</button>
</header>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#">Mobiles</a>
    <a href="#">Electronics</a>
    <a href="#">Fashion</a>
    <a href="#">Home</a>
    <a href="#">Appliances</a>
</div>

<!-- BANNER -->
<div class="banner">
    <h1>Big Billion Days Sale</h1>
    <p>Up to 70% OFF</p>
</div>

<!-- PRODUCT SECTION -->
<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>iPhone 14</h3>
        <p class="price">₹65,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Samsung TV</h3>
        <p class="price">₹45,000</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Shoes</h3>
        <p class="price">₹1,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150">
        <h3>Laptop</h3>
        <p class="price">₹55,000</p>
        <button>Add to Cart</button>
    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Flipkart Clone | Made by You</p>
</footer>

</body>
</html>
